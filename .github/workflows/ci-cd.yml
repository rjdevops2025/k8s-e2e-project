name: CI/CD Pipeline (Folder Strategy)

on:
  workflow_dispatch:   # Manual trigger for flexibility
  push:
    branches:
      - main           # single branch, folders define environments

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checkout code
      - name: Checkout
        uses: actions/checkout@v3

      # Set up Docker
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      # Login to DockerHub
      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Static Code Analysis (SonarCloud)
      - name: SonarCloud Scan
        uses: sonarsource/sonarcloud-github-action@master
        with:
          args: >
            -Dsonar.projectKey=rjdevops2025_k8s-e2e-project
            -Dsonar.organization=rjdevops2025
            -Dsonar.host.url=https://sonarcloud.io
            -Dsonar.login=${{ secrets.SONAR_TOKEN }}

      # Build Docker Image
      - name: Build Docker Image
        run: |
          docker build -t nginx-demo:${{ github.sha }} .
          docker tag nginx-demo:${{ github.sha }} rjdevops2025/nginx-demo:${{ github.sha }}

      # Security Scan (Trivy)
      - name: Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: rjdevops2025/nginx-demo:${{ github.sha }}

      # Push Image
      - name: Push Docker Image
        run: docker push rjdevops2025/nginx-demo:${{ github.sha }}

     deploy-dev:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Update Dev Manifests
        run: |
          sed -i "s|image: .*|image: rjdevops2025/nginx-demo:${{ github.sha }}|" manifests/dev/deployment.yaml
          git config --global user.email "ci@github.com"
          git config --global user.name "GitHub Actions"
          git add manifests/dev/deployment.yaml
          git commit -m "Deploy to Dev: ${{ github.sha }}"
          git push origin main

  deploy-qa:
    runs-on: ubuntu-latest
    needs: deploy-dev
    environment:
      name: qa
      
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Update QA Manifests
        run: |
          sed -i "s|image: .*|image: rjdevops2025/nginx-demo:${{ github.sha }}|" manifests/qa/deployment.yaml
          git add manifests/qa/deployment.yaml
          git commit -m "Deploy to QA: ${{ github.sha }}"
          git push origin main

  deploy-staging:
    runs-on: ubuntu-latest
    needs: deploy-qa
    environment:
      name: staging
  
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Update Staging Manifests
        run: |
          sed -i "s|image: .*|image: rjdevops2025/nginx-demo:${{ github.sha }}|" manifests/staging/deployment.yaml
          git add manifests/staging/deployment.yaml
          git commit -m "Deploy to Staging: ${{ github.sha }}"
          git push origin main

  deploy-prod:
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment:
      name: production
    
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Update Prod Manifests
        run: |
          sed -i "s|image: .*|image: rjdevops2025/nginx-demo:${{ github.sha }}|" manifests/prod/deployment.yaml
          git add manifests/prod/deployment.yaml
          git commit -m "Deploy to Prod: ${{ github.sha }}"
          git push origin main
